name: Validate Renovate config

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate default.json syntax
        run: python3 -m json.tool default.json >/dev/null

      - name: Validate default.json shape
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("default.json").read_text())
          assert isinstance(data.get("extends"), list)
          assert isinstance(data.get("packageRules"), list)
          PY

      - name: Validate vendored skills
        run: test -f skills/gh-link-issue-pr/SKILL.md && test -f skills/kaizen-bug-router/SKILL.md && test -f skills/pr-guardian/SKILL.md
