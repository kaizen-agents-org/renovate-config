version: 1
agent:
  default: codex
  fallback: true
  model:
    claude: null
    codex: null
run:
  maxIssuesPerNight: 1
  issueTimeoutMinutes: 30
  runTimeoutMinutes: 180
  maxVerifyRetries: 1
  maxAttemptsPerIssue: 3
  latestStartHour: 7
commands:
  setup: null
  verify:
    - "python3 -m json.tool default.json >/dev/null"
    - "grep -q '\"extends\"' default.json && grep -q '\"packageRules\"' default.json"
    - "test -f skills/gh-link-issue-pr/SKILL.md && test -f skills/kaizen-bug-router/SKILL.md && test -f skills/pr-guardian/SKILL.md"
  verifyTimeoutMinutes: 15
builder:
  command: builder-agent
  resultPath: .kaizen/builder/build-result.json
verifier:
  enabled: true
  command: verifier
  resultPath: .kaizen/verifier/verify-result.json
  timeoutMinutes: 15
policy:
  mode: pr-only
  directCommit:
    maxChangedLines: 0
    maxChangedFiles: 0
  protectedPaths:
    - .github/**
    - "**/.env*"
    - "**/secrets/**"
    - "**/*migration*/**"
    - Dockerfile
    - .kaizen/**
    - default.json
    - skills/**
  forbiddenPaths:
    - "**/.git/**"
git:
  defaultBranch: main
  branchPrefix: kaizen/
  commitMessageFormat: "kaizen: {summary} (#{issue})"
instant:
  unattendedMode: pr
report:
  notification: true
  issueComments: true
issues:
  label: kaizen
  priorityOrder:
    - kaizen:P0
    - kaizen:P1
    - kaizen:P2
